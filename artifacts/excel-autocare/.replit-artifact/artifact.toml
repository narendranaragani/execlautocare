kind = "web"
previewPath = "/"
title = "Excel Autocare"
version = "1.0.0"
id = "artifacts/excel-autocare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22702

[services.development]
run = "pnpm --filter @workspace/excel-autocare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/excel-autocare", "run", "build" ]
publicDir = "artifacts/excel-autocare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22702"
BASE_PATH = "/"
